<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>오름AI 부동산</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root {
  --orange:#F05A28;--orange-light:#FFF4EE;--orange-gradient:linear-gradient(135deg,#F05A28 0%,#FF8A5C 100%);
  --green:#34C759;--green-light:#F0FAF3;--blue:#4A90D9;--blue-light:#F0F5FF;
  --bg:#F5F6F8;--card:#FFFFFF;--text:#1C1C28;--text-secondary:#8891A0;--border:#E8ECF0;--radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#fff;min-height:100vh;min-height:100dvh}

.app-shell{width:100%;height:100vh;height:100dvh;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column}
.notch{display:none}
.status-bar{display:none}

@media(min-width:500px){
  body{background:#ECEDF0;display:flex;align-items:center;justify-content:center;padding:20px 0;min-height:100vh}
  .app-shell{width:375px;height:812px;max-height:calc(100vh - 40px);border-radius:40px;box-shadow:0 24px 60px rgba(0,0,0,.12),0 0 0 2px #2A2A2A,0 0 0 6px #3A3A3A,0 0 0 8px #2A2A2A}
  .notch{display:block;position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:32px;background:#222;border-radius:20px;z-index:50}
  .status-bar{display:flex;height:54px;padding:14px 24px 0;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;position:relative;z-index:40;flex-shrink:0}
  .status-bar .time{font-size:14px;font-weight:700}
  .status-bar .icons{display:flex;gap:5px;font-size:11px}
}

.top-bar{display:flex;justify-content:flex-end;gap:10px;padding:env(safe-area-inset-top,12px) 20px 4px;flex-shrink:0}
@media(min-width:500px){.top-bar{padding:0 20px 4px}}
.top-bar button{width:36px;height:36px;border-radius:12px;border:none;background:var(--bg);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
.noti-badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#EF4444;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}

.content-area{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
.content-area::-webkit-scrollbar{display:none}

.tab-bar{height:calc(78px + env(safe-area-inset-bottom,0px));padding-top:8px;padding-bottom:env(safe-area-inset-bottom,0px);background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-start;flex-shrink:0}
@media(min-width:500px){.tab-bar{height:78px;padding-bottom:0}}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;border:none;background:none;font-family:'Noto Sans KR',sans-serif}
.tab-icon{font-size:22px}
.tab-label{font-size:10px;font-weight:500;color:var(--text-secondary)}
.tab-item.active .tab-label{color:var(--orange);font-weight:700}

.m-header{padding:6px 20px 12px;display:flex;justify-content:space-between;align-items:center}
.m-header h1{font-size:22px;font-weight:800}
.m-sub-header{padding:6px 20px 12px;display:flex;align-items:center;gap:12px}
.m-back{background:none;border:none;font-size:18px;cursor:pointer;padding:4px}
.m-sub-header h1{font-size:18px;font-weight:700}

.m-stats{display:flex;gap:10px;padding:0 20px 16px}
.m-stat-card{flex:1;padding:14px 10px;border-radius:14px;text-align:center}
.m-stat-card.orange{background:var(--orange-light)}.m-stat-card.green{background:var(--green-light)}.m-stat-card.blue{background:var(--blue-light)}
.m-stat-num{font-size:24px;font-weight:800}
.m-stat-card.orange .m-stat-num{color:var(--orange)}.m-stat-card.green .m-stat-num{color:var(--green)}.m-stat-card.blue .m-stat-num{color:var(--blue)}
.m-stat-label{font-size:11px;color:var(--text-secondary);margin-top:2px;font-weight:500}
.section-title{display:flex;justify-content:space-between;align-items:center;padding:0 20px 12px}
.section-title h2{font-size:16px;font-weight:700}

.search-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid transparent;font-size:14px;font-weight:600;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg);outline:none;transition:border .2s}
.search-input:focus{border-color:var(--orange)}

.property-list{padding:0 20px 100px;display:flex;flex-direction:column;gap:12px}
.property-item{display:flex;gap:14px;padding:14px;border-radius:var(--radius);background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.property-item:active{transform:scale(.98)}
.prop-thumb{width:72px;height:72px;border-radius:14px;background:var(--orange-light);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.prop-info{flex:1;min-width:0}
.prop-name{font-size:15px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-addr{font-size:12px;color:var(--text-secondary);margin-bottom:6px}
.prop-price{font-size:16px;font-weight:800;color:var(--orange);margin-bottom:6px}
.prop-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.tag-type{background:#F3F4F6;color:#4B5563}.tag-done{background:var(--green-light);color:var(--green)}.tag-draft{background:var(--blue-light);color:var(--blue)}

.fab{position:absolute;bottom:calc(90px + env(safe-area-inset-bottom,0px));right:20px;width:56px;height:56px;border-radius:50%;background:var(--orange-gradient);border:none;font-size:24px;color:#fff;cursor:pointer;z-index:50;box-shadow:0 6px 20px rgba(240,90,40,.35);display:flex;align-items:center;justify-content:center;transition:transform .2s}
@media(min-width:500px){.fab{bottom:90px}}
.fab:active{transform:scale(.9)}

.voice-area{display:flex;flex-direction:column;align-items:center;padding:12px 20px;background:linear-gradient(180deg,#FFFFFF,#F8F9FB)}
.recording-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:var(--orange);color:#fff;font-size:13px;font-weight:600;margin-bottom:12px}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.rec-btn-wrap{position:relative;margin-bottom:10px;width:170px;height:170px;display:flex;align-items:center;justify-content:center}
.rec-pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(240,90,40,.15);animation:pulse 2s infinite}
.rec-pulse.p1{width:140px;height:140px}.rec-pulse.p2{width:170px;height:170px;animation-delay:.5s}
@keyframes pulse{0%{transform:translate(-50%,-50%) scale(.9);opacity:.6}100%{transform:translate(-50%,-50%) scale(1.1);opacity:0}}
.rec-btn{width:110px;height:110px;border-radius:50%;background:var(--orange-gradient);border:none;font-size:40px;color:#fff;cursor:pointer;box-shadow:0 10px 40px rgba(240,90,40,.35);position:relative;z-index:2;display:flex;align-items:center;justify-content:center}
.rec-timer{font-size:28px;font-weight:800;margin:4px 0}
.rec-hint{text-align:center;font-size:12px;color:var(--text-secondary);line-height:1.6}
.transcript-area{margin:12px 20px 0;padding:16px;background:var(--bg);border-radius:var(--radius);font-size:14px;line-height:1.7;color:var(--text-secondary);min-height:70px;max-height:150px;overflow-y:auto}
.transcript-area .hl{color:var(--orange);font-weight:600}
.voice-actions{display:flex;gap:12px;padding:16px 20px}
.btn-cancel-v{flex:1;padding:14px;border-radius:12px;border:1px solid var(--border);background:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--text-secondary)}
.btn-convert{flex:1.5;padding:14px;border-radius:12px;border:none;background:var(--orange);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

.ai-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:500px;padding:40px 20px;text-align:center}
.ai-spinner{width:80px;height:80px;border-radius:50%;background:var(--orange-gradient);display:flex;align-items:center;justify-content:center;font-size:36px;animation:spinPulse 1.5s ease-in-out infinite;margin-bottom:24px}
@keyframes spinPulse{0%{transform:scale(1);box-shadow:0 0 0 0 rgba(240,90,40,.4)}50%{transform:scale(1.1);box-shadow:0 0 0 20px rgba(240,90,40,0)}100%{transform:scale(1);box-shadow:0 0 0 0 rgba(240,90,40,0)}}
.ai-loading-text{font-size:18px;font-weight:700;margin-bottom:8px}
.ai-loading-sub{font-size:13px;color:var(--text-secondary);line-height:1.6}
.ai-progress-bar{width:200px;height:4px;background:var(--border);border-radius:2px;margin-top:20px;overflow:hidden}
.ai-progress-fill{height:100%;background:var(--orange-gradient);border-radius:2px;animation:progressAnim 2s ease-in-out forwards}
@keyframes progressAnim{0%{width:0}30%{width:40%}60%{width:70%}90%{width:90%}100%{width:100%}}

.detail-hero{background:linear-gradient(135deg,var(--orange-light),#FAFBFC);padding:12px 20px 24px;text-align:center}
.detail-hero .emoji{font-size:56px;margin:8px 0}
.detail-tags{display:flex;justify-content:center;gap:8px;margin-bottom:8px}
.detail-name{font-size:20px;font-weight:800}
.detail-addr-t{font-size:13px;color:var(--text-secondary);margin-top:4px}
.detail-body{padding:20px}
.detail-price{font-size:28px;font-weight:800;color:var(--orange);margin-bottom:20px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.info-cell{padding:14px;background:var(--bg);border-radius:12px}
.info-cell .label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;font-weight:500}
.info-cell .value{font-size:15px;font-weight:700}
.memo-card{padding:16px;background:var(--bg);border-radius:var(--radius);margin-bottom:20px}
.memo-title{font-size:14px;font-weight:700;margin-bottom:8px}
.owner-card{padding:16px;background:var(--bg);border-radius:var(--radius);margin-bottom:20px;border-left:3px solid var(--orange)}
.owner-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0}
.owner-label{color:var(--text-secondary)}.owner-val{font-weight:700}
.owner-memo{font-size:12px;color:var(--text-secondary);background:#fff;padding:8px 10px;border-radius:8px;margin-top:6px}
.detail-actions{display:flex;gap:12px;margin-bottom:12px}
.btn-edit-d{flex:1;padding:14px;border-radius:12px;border:1px solid var(--border);background:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--text)}
.btn-share{flex:1;padding:14px;border-radius:12px;border:none;background:var(--orange);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

.match-section{margin-bottom:20px}
.match-title{font-size:15px;font-weight:800;margin-bottom:10px}
.match-item{display:flex;gap:12px;padding:12px;border-radius:12px;background:var(--bg);border:1px solid var(--orange-light);margin-bottom:8px;cursor:pointer;align-items:center}
.match-avatar{width:36px;height:36px;border-radius:50%;background:var(--orange-gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0}
.match-info{flex:1;min-width:0}
.match-name{font-size:13px;font-weight:700}
.match-badge{padding:2px 8px;border-radius:12px;background:var(--orange-light);color:var(--orange);font-size:11px;font-weight:800;margin-left:4px}
.match-meta{font-size:11px;color:var(--text-secondary);margin-top:2px}

.edit-form{padding:0 20px 100px}
.edit-section{margin-bottom:16px}
.edit-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
.edit-input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-weight:600;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:#fff;outline:none;transition:border .2s}
.edit-input:focus{border-color:var(--orange)}
.edit-input.price{color:var(--orange);font-size:18px;font-weight:800}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.edit-textarea{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text-secondary);min-height:80px;resize:none;outline:none}
.edit-textarea:focus{border-color:var(--orange)}
.ai-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;background:var(--orange-light);color:var(--orange);font-size:11px;font-weight:700;margin-bottom:16px}
.save-actions{display:flex;gap:12px;margin-top:20px}
.btn-re{flex:1;padding:14px;border-radius:12px;border:1px solid var(--border);background:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.btn-save{flex:1;padding:14px;border-radius:12px;border:none;background:var(--orange);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

.customer-filter{display:flex;gap:8px;padding:0 20px 12px;overflow-x:auto}
.cfilter{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--text-secondary);white-space:nowrap;flex-shrink:0}
.cfilter.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.customer-list{padding:0 20px 100px;display:flex;flex-direction:column;gap:10px}
.customer-item{display:flex;gap:14px;padding:14px;border-radius:var(--radius);background:var(--card);border:1px solid var(--border);cursor:pointer;align-items:center;transition:all .15s}
.customer-item:active{transform:scale(.98)}
.customer-avatar{width:44px;height:44px;border-radius:50%;background:var(--orange-gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0}
.customer-info{flex:1;min-width:0}
.customer-name{font-size:14px;font-weight:700;margin-bottom:2px}
.customer-meta{font-size:12px;color:var(--text-secondary)}
.customer-need{font-size:12px;color:var(--orange);font-weight:600;margin-top:2px}
.customer-arrow{color:var(--text-secondary);font-size:18px}

.cd-profile{display:flex;align-items:center;gap:14px;padding:0 20px 16px}
.cd-avatar{width:52px;height:52px;border-radius:50%;background:var(--orange-gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}
.cd-name{font-size:18px;font-weight:800}
.cd-role{font-size:13px;color:var(--text-secondary);margin-top:2px}
.cd-contact{display:flex;gap:8px;padding:0 20px 16px}
.cd-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-align:center}
.cd-section{padding:0 20px 16px}
.cd-section-title{font-size:14px;font-weight:700;margin-bottom:10px}
.cd-card{background:var(--bg);border-radius:var(--radius);padding:14px}
.cd-row{display:flex;justify-content:space-between;padding:7px 0;font-size:13px}
.cd-label-t{color:var(--text-secondary)}.cd-val{font-weight:700}
.cd-memo-box{padding:18px;background:var(--bg);border-radius:16px;border-left:4px solid var(--orange);font-size:14px;line-height:2;white-space:pre-wrap}

.my-profile{display:flex;align-items:center;gap:14px;margin:0 20px 16px;padding:20px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.my-avatar{width:52px;height:52px;border-radius:50%;background:var(--orange-gradient);display:flex;align-items:center;justify-content:center}
.my-name{font-size:18px;font-weight:800}.my-role{font-size:13px;color:var(--text-secondary);margin-top:2px}
.my-biz{margin:0 20px 16px;padding:18px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);border-left:3px solid var(--orange)}
.my-biz-title{font-size:15px;font-weight:700;margin-bottom:14px}
.my-biz-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0}
.my-biz-label{color:var(--text-secondary)}.my-biz-val{font-weight:700}
.my-menu{margin:0 20px 100px;display:flex;flex-direction:column;gap:2px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.my-menu-item{display:flex;align-items:center;gap:10px;padding:16px 18px;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--text);text-align:left;transition:background .15s;width:100%}
.my-menu-item:active{background:var(--bg)}
.my-menu-item+.my-menu-item{border-top:1px solid var(--border)}
.my-menu-item.danger{color:#EF4444}

.noti-list{padding:0 20px 100px;display:flex;flex-direction:column;gap:10px}
.noti-item{display:flex;gap:12px;padding:14px;border-radius:var(--radius);background:var(--card);border:1px solid var(--border);cursor:pointer;align-items:center;transition:all .15s}
.noti-item.unread{background:#FFF8F0}
.noti-item:active{transform:scale(.98)}
.noti-icon-w{width:42px;height:42px;border-radius:12px;background:var(--orange-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.noti-info{flex:1}
.noti-title-t{font-size:13px;font-weight:700;margin-bottom:2px}
.noti-desc{font-size:11px;color:var(--text-secondary)}
.noti-time{font-size:11px;color:var(--text-secondary);flex-shrink:0}

.onboard{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(40px + env(safe-area-inset-top,0px)) 32px 40px;text-align:center;min-height:100%}
@media(min-width:500px){.onboard{padding:40px 32px}}
.onboard-logo{width:64px;height:64px;border-radius:18px;background:var(--orange-gradient);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin-bottom:24px;box-shadow:0 8px 24px rgba(240,90,40,.25)}
.onboard-title{font-size:24px;font-weight:800;margin-bottom:10px}
.onboard-desc{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:36px}
.kakao-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border-radius:12px;border:none;background:#FEE500;font-size:16px;font-weight:700;color:#3C1E1E;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;margin-bottom:12px}
.kakao-btn:active{transform:scale(.97)}
.phone-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border-radius:12px;border:1.5px solid var(--border);background:#fff;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.phone-btn:active{transform:scale(.97)}
.onboard-terms{margin-top:20px;font-size:11px;color:var(--text-secondary)}
.onboard-terms a{color:var(--orange);text-decoration:none}

.scan-screen{display:flex;flex-direction:column;align-items:center;padding:calc(20px + env(safe-area-inset-top,0px)) 20px 20px}
@media(min-width:500px){.scan-screen{padding:20px}}
.scan-header{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:20px}
.scan-step{padding:5px 14px;border-radius:20px;background:var(--orange-light);color:var(--orange);font-size:13px;font-weight:700}
.scan-skip{background:none;border:none;font-size:13px;color:var(--text-secondary);font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.scan-title{font-size:20px;font-weight:800;margin-bottom:6px}
.scan-desc{font-size:13px;color:var(--text-secondary);margin-bottom:24px}
.scan-frame{position:relative;width:100%;height:180px;background:#1A1A2E;border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer}
.scan-corner{position:absolute;width:24px;height:24px;border:3px solid var(--orange)}
.scan-corner.tl{top:16px;left:16px;border-right:none;border-bottom:none;border-radius:4px 0 0 0}
.scan-corner.tr{top:16px;right:16px;border-left:none;border-bottom:none;border-radius:0 4px 0 0}
.scan-corner.bl{bottom:16px;left:16px;border-right:none;border-top:none;border-radius:0 0 0 4px}
.scan-corner.br{bottom:16px;right:16px;border-left:none;border-top:none;border-radius:0 0 4px 0}

function getMatches(pi){

}

        <div className="rec-btn-wrap"><div className="rec-pulse p1"/><div className="rec-pulse p2"/><button className="rec-btn">🎙️</button></div>
        <div className="rec-timer">01:23</div>
        <div className="rec-hint">현장에서 자유롭게 말씀하세요<br/>AI가 자동으로 정리합니다</div>
      </div>
      <div className="transcript-area">"래미안 레이크뷰 108동 전용 84제곱미터 25층이고요, 남향입니다. 매매가는 18억 5천이에요. <span className="hl">방 3개에 화장실 2개</span>이고요. 거실에서 한강 조망이 됩니다."</div>
      <div className="voice-actions"><button className="btn-cancel-v" onClick={()=>go('list')}>취소</button><button className="btn-convert" onClick={()=>{go('ai-loading');goDelayed('edit',2200)}}>녹음 완료 →</button></div>
    </>);
    case 'ai-loading': return(<div className="ai-loading"><div className="ai-spinner">✨</div><div className="ai-loading-text">AI가 매물 정보를 정리하고 있어요</div><div className="ai-loading-sub">음성에서 자동 추출합니다</div><div className="ai-progress-bar"><div className="ai-progress-fill"/></div></div>);
    case 'edit':
      const ep=P[selProp];
      return(<>
        <div className="m-sub-header"><button className="m-back" onClick={()=>go('voice')}>←</button><h1>매물 확인</h1></div>
        <div style={{padding:'0 20px'}}><div className="ai-badge">✨ AI가 자동으로 채운 정보입니다</div></div>
        <div className="edit-form">
          <div className="edit-section"><div className="edit-label">매물명</div><input className="edit-input" defaultValue={ep.name}/></div>
          <div className="edit-section"><div className="edit-label">주소</div><input className="edit-input" defaultValue={ep.addr}/></div>
          <div className="edit-row" style={{marginBottom:16}}><div className="edit-section"><div className="edit-label">유형</div><input className="edit-input" defaultValue={ep.type}/></div><div className="edit-section"><div className="edit-label">거래</div><input className="edit-input" defaultValue={ep.deal}/></div></div>
          <div className="edit-section"><div className="edit-label">가격</div><input className="edit-input price" defaultValue={ep.price}/></div>
          <div className="edit-row" style={{marginBottom:16}}><div className="edit-section"><div className="edit-label">면적</div><input className="edit-input" defaultValue={ep.area}/></div><div className="edit-section"><div className="edit-label">층수</div><input className="edit-input" defaultValue={ep.floor}/></div></div>
          <div style={{marginBottom:12,paddingTop:12,borderTop:'2px solid var(--orange-light)'}}><div style={{fontSize:13,fontWeight:700,color:'var(--orange)',marginBottom:12}}>👤 집주인 정보</div></div>
          <div className="edit-row" style={{marginBottom:16}}><div className="edit-section"><div className="edit-label">이름</div><input className="edit-input" defaultValue={ep.ownerName}/></div><div className="edit-section"><div className="edit-label">연락처</div><input className="edit-input" defaultValue={ep.ownerPhone}/></div></div>
          <div className="edit-section"><div className="edit-label">📝 메모</div><textarea className="edit-textarea" defaultValue={ep.memo}/></div>
          <div className="save-actions"><button className="btn-re" onClick={()=>go('voice')}>← 다시 녹음</button><button className="btn-save" onClick={()=>go('detail')}>✅ 저장하기</button></div>
        </div>
      </>);
    case 'detail':
      const dp=P[selProp],matches=getMatches(selProp);
      return(<>
        <div className="m-sub-header"><button className="m-back" onClick={()=>go('list')}>←</button><h1>매물 상세</h1></div>
        <div className="detail-hero"><div className="emoji">{dp.emoji}</div><div className="detail-tags"><span className="tag tag-type">{dp.type} · {dp.deal}</span><StatusTag s={dp.status}/></div><div className="detail-name">{dp.name}</div><div className="detail-addr-t">{dp.addr} · {dp.floor}</div></div>
        <div className="detail-body">
          <div className="detail-price">{dp.deal} {dp.price}</div>
          <div className="info-grid"><div className="info-cell"><div className="label">면적</div><div className="value">전용 {dp.area}</div></div><div className="info-cell"><div className="label">방 · 욕실</div><div className="value">{dp.rooms} · {dp.baths}</div></div><div className="info-cell"><div className="label">방향</div><div className="value">{dp.dir} 🧭</div></div><div className="info-cell"><div className="label">입주가능일</div><div className="value">{dp.moveIn}</div></div></div>
          <div style={{marginBottom:20}}><div style={{fontSize:15,fontWeight:800,marginBottom:10}}>📝 메모</div><div style={{padding:18,background:'var(--bg)',borderRadius:16,borderLeft:'4px solid var(--orange)',fontSize:14,lineHeight:2,whiteSpace:'pre-wrap'}}>{dp.memo}</div></div>
          <div className="owner-card"><div className="memo-title">👤 집주인 정보</div><div className="owner-row"><span className="owner-label">이름</span><span className="owner-val">{dp.ownerName}</span></div><div className="owner-row"><span className="owner-label">연락처</span><span className="owner-val" style={{color:'var(--orange)'}}>{dp.ownerPhone}</span></div><div className="owner-row"><span className="owner-label">관계</span><span className="owner-val">{dp.ownerRel}</span></div><div className="owner-memo">💬 {dp.ownerMemo}</div></div>
          <div className="match-section"><div className="match-title">🎯 매칭 고객 <span style={{fontSize:13,color:'var(--orange)'}}>{matches.length}명</span></div>
            {matches.map((m,i)=>{const c=C[m.idx];return(<div className="match-item" key={i} onClick={()=>{setSelCust(m.idx);go('customer-detail')}}><div className="match-avatar">{c.name[0]}</div><div className="match-info"><div className="match-name">{c.name} <span className="match-badge">{m.score}%</span></div><div className="match-meta">{c.need} · {c.type} · {c.area}</div></div></div>)})}
          </div>
          <div className="detail-actions"><button className="btn-edit-d">✏️ 수정</button><button className="btn-share" onClick={()=>{setSlide(0);go('share')}}>📤 공유하기</button></div>
          <div style={{marginBottom:20}}><div className="memo-title">📤 공유 이력</div><div className="history-item"><div className="history-icon-w kakao">💬</div><div className="history-info"><div className="history-method">카카오톡</div><div className="history-date">2026.02.27</div></div><div className="history-count">사진 3장</div></div><div className="history-item"><div className="history-icon-w sms">💌</div><div className="history-info"><div className="history-method">문자</div><div className="history-date">2026.02.26</div></div><div className="history-count">사진 5장</div></div></div>
        </div>
      </>);
    case 'share':
      const photos=['🏢','🛋️','🍳','🛁','🌇'],labels=['거실','안방','주방','욕실','베란다'];
      return(<>
        <div className="m-sub-header" style={{justifyContent:'space-between'}}><div style={{display:'flex',alignItems:'center',gap:12}}><button className="m-back" onClick={()=>go('detail')}>←</button><h1>매물 공유</h1></div><div style={{padding:'5px 12px',borderRadius:20,background:'var(--orange-light)',color:'var(--orange)',fontSize:13,fontWeight:700}}>5/5장</div></div>
        <div className="carousel-wrap"><div className="carousel-track" style={{transform:`translateX(-${slide*100}%)`}}>{photos.map((em,i)=><div className="slide" key={i}><div className="slide-img">{em}</div><div className="slide-label">{labels[i]}</div></div>)}</div><div className="carousel-dots">{photos.map((_,i)=><span key={i} className={`dot ${i===slide?'active':''}`} onClick={()=>setSlide(i)}/>)}</div></div>
        <div className="biz-card-w"><div className="biz-left"><div className="biz-logo-w">오</div><div><div className="biz-name-t">김민수</div><div className="biz-title-t">공인중개사</div></div></div><div className="biz-right"><div className="biz-contact-t">📞 02-1234-5678</div><div className="biz-contact-t">📱 010-9876-5432</div><div className="biz-org">오름공인중개사사무소</div></div></div>
        <div className="share-actions-row"><button className="share-btn-w"><div className="share-icon-w kakao">💬</div><div className="share-title">카카오톡</div><div className="share-sub">사진 5장 + 명함</div></button><button className="share-btn-w"><div className="share-icon-w sms-s">💌</div><div className="share-title">문자</div><div className="share-sub">사진 5장 + 명함</div></button><button className="share-btn-w"><div className="share-icon-w img">🖼️</div><div className="share-title">저장</div><div className="share-sub">사진 5장 + 명함</div></button></div>
      </>);
    case 'customer-list':
      const cFilters=['전체','매수','전세','월세','매칭완료'];
      const cFiltered=C.filter(c=>{if(filter==='전체')return true;if(filter==='매칭완료')return c.status==='matched';return c.need===filter;});
      return(<>
        <div className="m-header"><h1>고객 관리</h1></div>
        <div style={{padding:'0 20px 12px'}}><input className="search-input" placeholder="🔍 고객명, 연락처 검색"/></div>
        <div className="m-stats"><div className="m-stat-card orange"><div className="m-stat-num">{C.length}</div><div className="m-stat-label">전체 고객</div></div><div className="m-stat-card green"><div className="m-stat-num">{C.filter(c=>c.status==='matched').length}</div><div className="m-stat-label">매칭완료</div></div><div className="m-stat-card blue"><div className="m-stat-num">{C.filter(c=>c.status==='searching').length}</div><div className="m-stat-label">찾는 중</div></div></div>
        <div className="customer-filter">{cFilters.map(f=><button key={f} className={`cfilter ${filter===f?'active':''}`} onClick={()=>setFilter(f)}>{f}</button>)}</div>
        <div className="customer-list">{cFiltered.map((c,i)=>{const ri=C.indexOf(c);return(
          <div className="customer-item" key={ri} onClick={()=>{setSelCust(ri);go('customer-detail')}}>
            <div className="customer-avatar">{c.name[0]}</div>
            <div className="customer-info"><div className="customer-name">{c.name} <CTag s={c.status}/></div><div className="customer-meta">{c.phone} · {c.area}</div><div className="customer-need">{c.need} · {c.budget}</div></div>
            <div className="customer-arrow">›</div>
          </div>)})}</div>
      </>);
    case 'customer-detail':
      const cd=C[selCust];
      return(<>
        <div className="m-sub-header"><button className="m-back" onClick={()=>go(prevScr==='detail'?'detail':'customer-list')}>←</button><h1>고객 카드</h1></div>
        <div className="cd-profile"><div className="cd-avatar">{cd.name[0]}</div><div><div className="cd-name">{cd.name}</div><div className="cd-role">{cd.need} 고객{cd.status==='matched'&&<span style={{color:'var(--green)'}}> · 매칭완료</span>}</div></div></div>
        <div className="cd-contact"><button className="cd-btn" style={{background:'#FEE500',borderColor:'#FEE500',color:'#3C1E1E'}}>💬 카카오</button><button className="cd-btn" style={{background:'var(--green)',borderColor:'var(--green)',color:'#fff'}}>📱 문자</button><button className="cd-btn">📞 전화</button></div>
        <div className="cd-section"><div className="cd-section-title">📋 요구사항</div><div className="cd-card"><div className="cd-row"><span className="cd-label-t">희망 지역</span><span className="cd-val">{cd.area}</span></div><div className="cd-row"><span className="cd-label-t">거래 유형</span><span className="cd-val">{cd.need}</span></div><div className="cd-row"><span className="cd-label-t">예산</span><span className="cd-val">{cd.budget}</span></div><div className="cd-row"><span className="cd-label-t">유형</span><span className="cd-val">{cd.type}</span></div><div className="cd-row"><span className="cd-label-t">면적</span><span className="cd-val">{cd.size}</span></div><div className="cd-row"><span className="cd-label-t">층수</span><span className="cd-val">{cd.floor}</span></div></div></div>
        <div className="cd-section" style={{paddingBottom:100}}><div className="cd-section-title">📝 메모</div><div className="cd-memo-box">{cd.memo}</div></div>
      </>);
    case 'noti': return(<>
      <div className="m-sub-header"><button className="m-back" onClick={()=>go('list')}>←</button><h1>알림</h1></div>
      <div className="noti-list">{NOTI.map((n,i)=><div className={`noti-item ${n.unread?'unread':''}`} key={i} onClick={()=>{if(n.propIdx>=0){setSelProp(n.propIdx);go('detail')}}}><div className="noti-icon-w">{n.type==='match'?'🎯':'✅'}</div><div className="noti-info"><div className="noti-title-t">{n.title}</div><div className="noti-desc">{n.desc}</div></div><div className="noti-time">{n.time}</div></div>)}</div>
    </>);
    case 'my': return(<>
      <div className="m-sub-header"><button className="m-back" onClick={()=>go('list')}>←</button><h1>마이</h1></div>
      <div className="my-profile"><div className="my-avatar"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg></div><div><div className="my-name">김민수</div><div className="my-role">공인중개사</div></div></div>
      <div className="my-biz"><div className="my-biz-title">🏠 오름공인중개사사무소</div><div className="my-biz-row"><span className="my-biz-label">전화</span><span className="my-biz-val">02-1234-5678</span></div><div className="my-biz-row"><span className="my-biz-label">휴대폰</span><span className="my-biz-val">010-9876-5432</span></div><div className="my-biz-row"><span className="my-biz-label">주소</span><span className="my-biz-val">서울시 서초구 반포대로 123</span></div></div>
      <div className="my-menu"><button className="my-menu-item">📷 명함 다시 촬영</button><button className="my-menu-item">⚙️ 설정</button><button className="my-menu-item danger" onClick={()=>{setLoggedIn(false);go('login')}}>🚪 로그아웃</button></div>
    </>);
    default: return null;
    }
  };

  return(
    <div className="app-shell">
      <div className="notch"/>
      <div className="status-bar"><span className="time">9:41</span><span className="icons"><span>📶</span><span>📡</span><span>🔋</span></span></div>
      {showTabs&&<div className="top-bar"><button onClick={()=>{setNotiCnt(0);go('noti')}}>🔔{notiCnt>0&&<span className="noti-badge">{notiCnt}</span>}</button><button onClick={()=>go('my')}>👤</button></div>}
      <div className="content-area" ref={ref}>{renderScreen()}</div>
      {showTabs&&<div className="tab-bar">
        <button className={`tab-item ${screen==='list'||screen==='detail'||screen==='share'?'active':''}`} onClick={()=>go('list')}><span className="tab-icon">📋</span><span className="tab-label">매물</span></button>
        <button className={`tab-item ${screen==='voice'||screen==='edit'||screen==='ai-loading'?'active':''}`} onClick={()=>go('voice')}><span className="tab-icon">🎙️</span><span className="tab-label">녹음</span></button>
        <button className={`tab-item ${screen==='customer-list'||screen==='customer-detail'?'active':''}`} onClick={()=>go('customer-list')}><span className="tab-icon">👥</span><span className="tab-label">고객</span></button>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
